<form (ngSubmit)="addNumbers()">
  <label for="num1">Number 1:</label>
  <input type="number" id="num1" [(ngModel)]="number1" name="number1" required />

  <br /><br />

  <label for="num2">Number 2:</label>
  <input type="number" id="num2" [(ngModel)]="number2" name="number2" required />

  <br /><br />

  <button type="submit">Add</button>

  <p *ngIf="sum !== null">Result: {{ sum }}</p>
</form>
